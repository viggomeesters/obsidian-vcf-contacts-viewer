<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">VCF Contacts Viewer social preview</title>
  <desc id="desc">Read-only VCF contact cards, raw source, search, and privacy warnings for Obsidian.</desc>
  <rect width="1280" height="640" fill="#0f172a"/>
  <rect x="72" y="72" width="1136" height="496" rx="28" fill="#f8fafc"/>
  <text x="128" y="184" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900">VCF Contacts Viewer</text>
  <text x="132" y="240" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="28">Read-only contact cards, raw source, and privacy warnings.</text>
  <g transform="translate(132 318)">
    <rect width="1016" height="148" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="82" cy="74" r="38" fill="#0f766e"/>
    <text x="67" y="88" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900">J</text>
    <text x="150" y="62" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">No contact notes. No write-back.</text>
    <text x="150" y="104" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="22">Inspect names, email, phone, PHOTO metadata, and source.</text>
  </g>
  <text x="132" y="520" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">vcf-contacts-viewer</text>
</svg>
