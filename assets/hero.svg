<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">VCF Contacts Viewer</title>
  <desc id="desc">A straight read-only contact card interface for VCF files.</desc>
  <rect width="1400" height="420" fill="#f8fafc"/>
  <rect x="48" y="48" width="1304" height="324" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="48" y="48" width="1304" height="54" rx="18" fill="#ecfeff"/>
  <rect x="48" y="82" width="1304" height="20" fill="#ecfeff"/>
  <circle cx="84" cy="75" r="8" fill="#ef4444"/>
  <circle cx="112" cy="75" r="8" fill="#f59e0b"/>
  <circle cx="140" cy="75" r="8" fill="#22c55e"/>
  <text x="86" y="162" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">VCF Contacts Viewer</text>
  <text x="88" y="204" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">Read-only contact cards and import-preflight warnings</text>
  <g transform="translate(88 246)">
    <rect width="118" height="34" rx="8" fill="#0f766e"/>
    <text x="24" y="23" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Cards</text>
    <rect x="130" width="112" height="34" rx="8" fill="#e2e8f0"/>
    <text x="154" y="23" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Source</text>
    <rect x="254" width="184" height="34" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="276" y="23" fill="#92400e" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">PHOTO blocked</text>
  </g>
  <g transform="translate(752 112)">
    <rect width="520" height="240" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <circle cx="70" cy="72" r="34" fill="#0f766e"/>
    <text x="56" y="84" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900">J</text>
    <text x="126" y="66" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">Jane Doe</text>
    <text x="126" y="98" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Example Co / Research</text>
    <line x1="34" y1="132" x2="486" y2="132" stroke="#cbd5e1"/>
    <text x="46" y="170" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">EMAIL</text>
    <text x="138" y="170" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="15">jane@example.com</text>
    <text x="46" y="208" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">PHONE</text>
    <text x="138" y="208" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="15">+1 555 0101</text>
  </g>
</svg>
